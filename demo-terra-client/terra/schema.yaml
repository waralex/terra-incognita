transaction_meta:
  reasoning:
    type: text
    required: true
  question:
    type: text
  answer:
    type: text

entity_change_meta:
  reasoning:
    type: text
    required: true

branch_meta:
  reasoning:
    type: text
    required: true

assertion_statuses:
  values: [fact, hypothesis, observation]
  terminal: fact
  default: observation

managed_types:
  rule:
    fields:
      content:   { type: text, required: true }
      rationale: { type: text }
    lifecycle:
      initial: draft
      states: [draft, active, rejected, promoted]
      visible: [draft, active]
